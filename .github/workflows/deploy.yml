name: deploy

# Runs on the self-hosted runner installed on the production server
# (46.202.160.133), and only after the "tests" workflow succeeds on main,
# so production is never updated from a red build.
on:
  workflow_run:
    workflows: ["tests"]
    types:
      - completed
    branches:
      - main

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to production
    runs-on: [self-hosted, production]
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: production
      url: https://soba.primehubonline.com

    defaults:
      run:
        working-directory: ${{ secrets.PROD_APP_DIR }}

    steps:
      - name: Enable maintenance mode
        run: php artisan down --render="errors::503" --retry=15 || true

      - name: Pull latest code
        run: |
          git fetch origin --prune
          git checkout -f main
          git reset --hard origin/main

      - name: Install PHP dependencies
        run: composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader

      - name: Build front-end assets
        run: |
          npm ci
          npm run build

      - name: Run database migrations
        run: php artisan migrate --force

      - name: Rebuild caches
        run: |
          php artisan optimize:clear
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache
          php artisan event:cache

      - name: Restart queue workers
        run: php artisan queue:restart

      - name: Disable maintenance mode
        if: always()
        run: php artisan up || true
